services:
  web:
    build: .
    expose:
      - "5555"
    env_file:
      - .env
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      # App code is baked into the image (Dockerfile COPY).
      # The tracked dev workflow layers docker-compose.dev.yml on top when
      # live-edit bind mounts are needed.
      # Runtime data (read/written by the app, persisted across rebuilds):
      - ./shows.json:/app/shows.json
      - ./episodes:/app/episodes
      - ./thumbnails:/app/thumbnails
      - ./downloads:/app/downloads
      - ./config:/config
      - ./data:/app/data
      - "${AUTO_ADD_DIR_HOST:-./auto_add_dir}:/app/auto_add_dir"
      - "${MUSIC_DIR_HOST:-./music_dir}:/app/music_dir"
    environment:
      - FLASK_APP=nts_feed.app:create_app
      # FLASK_ENV and FLASK_DEBUG come from .env file (override sets FLASK_DEBUG=1 for dev)
      - MUSIC_DIR=/app/music_dir
      - ENABLE_TALISMAN=true
      - FORCE_HTTPS=false
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=5555
      # Gunicorn settings (used when FLASK_DEBUG != 1)
      # Single worker with threads: SSE endpoints and in-memory queues
      # require shared process memory (multiple workers = separate processes).
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=4
      - GUNICORN_TIMEOUT=120
      # Prevent BLAS libraries from spawning threads per CPU core (wasteful in containers)
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - NUMEXPR_MAX_THREADS=1
      # Right-size background thread pools for a single-user app
      - EXECUTOR_MAX_WORKERS=3
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

  # One-shot init container that runs before nginx and web:
  #   1. Ensures shows.json exists as a file (Docker creates a directory
  #      for missing bind-mount sources, which crashes the app).
  #   2. Generates a self-signed SSL cert if none exists.
  init:
    image: alpine:3.20
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # -- Seed files / directories ------------------------------------------
        # Docker bind-mounts create directories for missing sources; we need
        # shows.json to be a file.
        if [ -d /data/shows.json ]; then
          echo "Removing shows.json directory (was auto-created by Docker)..."
          rmdir /data/shows.json 2>/dev/null || rm -rf /data/shows.json
        fi
        [ -f /data/shows.json ] || echo '{}' > /data/shows.json
        # Ensure writable by appuser (UID 999) inside the web container
        chmod 666 /data/shows.json
        # Ensure data directories are writable
        for dir in /data/episodes /data/thumbnails /data/downloads /data/data; do
          mkdir -p "$$dir"
          chmod 777 "$$dir"
        done

        # -- SSL certificate ---------------------------------------------------
        if [ -f /ssl/fullchain.pem ] && [ -f /ssl/privkey.pem ]; then
          echo "SSL certificates already exist — skipping."
          exit 0
        fi
        apk add --no-cache openssl >/dev/null 2>&1
        echo "Generating self-signed SSL certificate for localhost..."
        openssl req -x509 -nodes -days 3650 \
          -newkey rsa:2048 \
          -keyout /ssl/privkey.pem \
          -out /ssl/fullchain.pem \
          -subj "/CN=localhost" \
          -addext "subjectAltName=DNS:localhost,IP:127.0.0.1" 2>/dev/null
        chmod 644 /ssl/fullchain.pem
        chmod 600 /ssl/privkey.pem
        echo "SSL certificate created."
    volumes:
      - ./config/nginx/ssl:/ssl
      - .:/data
    networks: []

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      init:
        condition: service_completed_successfully
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
      - ./thumbnails:/usr/share/nginx/html/thumbnails:ro
    environment:
      # Suppress "can not modify /etc/nginx/conf.d/default.conf" notice
      # This is expected because we mount the config as read-only (:ro)
      # which is the correct security practice
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
