# Proxy cache for API responses
error_log /dev/stderr warn;
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;

# Rate limiting — protects Flask backend from abuse
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_write:10m rate=5r/s;

# Upstream with keepalive connections for better performance
upstream flask_backend {
    server web:5555 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    # Security headers (CSP is managed by Flask-Talisman per-request)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header X-XSS-Protection "1; mode=block";

    # =========================================
    # Performance: Gzip compression
    # =========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml text/javascript application/x-javascript;

    # =========================================
    # Performance: Buffer settings
    # =========================================
    client_body_buffer_size 128k;
    client_max_body_size 10m;

    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 24k;

    # =========================================
    # Static assets - served directly by Nginx
    # =========================================
    location /static/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        open_file_cache max=1000 inactive=20s;
        open_file_cache_valid 30s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
    }

    # =========================================
    # API Caching: Genres endpoint (changes rarely)
    # =========================================
    location = /api/genres {
        proxy_cache api_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://flask_backend;
    }

    # =========================================
    # API Caching: Episode tracklist (immutable data)
    # =========================================
    location /api/episode_tracklist {
        proxy_cache api_cache;
        proxy_cache_valid 200 30m;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://flask_backend;
    }

    # =========================================
    # Thumbnail proxy with aggressive caching
    # =========================================
    location /thumbnail {
        proxy_cache api_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 302 5m;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        proxy_ignore_headers Set-Cookie Vary;
        proxy_hide_header Set-Cookie;

        add_header X-Cache-Status $upstream_cache_status always;

        proxy_buffer_size 16k;
        proxy_buffers 4 64k;
        proxy_busy_buffers_size 128k;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://flask_backend;
    }

    # =========================================
    # Check active downloads (cache briefly)
    # =========================================
    location /check_active_downloads {
        proxy_cache api_cache;
        proxy_cache_valid 200 2s;
        proxy_cache_key "$request_uri";
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://flask_backend;
    }

    # =========================================
    # SSE (Server-Sent Events) — disable buffering so events stream instantly
    # =========================================
    location ~ ^/(subscribe_progress|progress|update_progress|api/admin/enrich-artists/progress|api/admin/recalculate-track-weights/progress)(/|$) {
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;

        proxy_read_timeout 300s;

        add_header X-Accel-Buffering no always;

        proxy_pass http://flask_backend;
    }

    # =========================================
    # Default fallback to upstream
    # =========================================
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;

        proxy_pass http://flask_backend;
    }
}
