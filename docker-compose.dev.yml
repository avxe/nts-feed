# Tracked development overlay for explicit local dev runs.
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  web:
    volumes:
      - .:/app
      - "${AUTO_ADD_DIR_HOST:-./storage/auto_add_dir}:/app/storage/auto_add_dir"
      - "${MUSIC_DIR_HOST:-./storage/music_dir}:/app/storage/music_dir"
    environment:
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
      - WATCHDOG_USE_POLLING=true
