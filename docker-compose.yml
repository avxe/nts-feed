services:
  web:
    build: .
    expose:
      - "5555"
    env_file:
      - .env
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      # App code is baked into the image (Dockerfile COPY).
      # The tracked dev workflow layers docker-compose.dev.yml on top when
      # live-edit bind mounts are needed.
      # Runtime data (read/written by the app, persisted across rebuilds):
      - ./storage:/app/storage
      - ./config:/config
      - "${AUTO_ADD_DIR_HOST:-./storage/auto_add_dir}:/app/storage/auto_add_dir"
      - "${MUSIC_DIR_HOST:-./storage/music_dir}:/app/storage/music_dir"
    environment:
      - FLASK_APP=nts_feed.app:create_app
      - NTS_STORAGE_ROOT=/app/storage
      # FLASK_ENV and FLASK_DEBUG come from .env file (override sets FLASK_DEBUG=1 for dev)
      - ENABLE_TALISMAN=true
      - FORCE_HTTPS=false
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=5555
      # Gunicorn settings (used when FLASK_DEBUG != 1)
      # Single worker with threads: SSE endpoints and in-memory queues
      # require shared process memory (multiple workers = separate processes).
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=4
      - GUNICORN_TIMEOUT=120
      # Prevent BLAS libraries from spawning threads per CPU core (wasteful in containers)
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - NUMEXPR_MAX_THREADS=1
      # Right-size background thread pools for a single-user app
      - EXECUTOR_MAX_WORKERS=3
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

  # One-shot init container that runs before nginx and web:
  #   1. Ensures the consolidated runtime storage tree exists.
  #   2. Migrates legacy root-level runtime state into ./storage on upgrade.
  #   2. Generates a self-signed SSL cert if none exists.
  init:
    image: alpine:3.20
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # -- Seed files / directories ------------------------------------------
        # Keep upgrades safe by moving legacy root-level runtime paths into
        # the consolidated storage root before the app starts.
        if [ -d /storage/shows.json ]; then
          echo "Removing invalid storage/shows.json directory..."
          rmdir /storage/shows.json 2>/dev/null || rm -rf /storage/shows.json
        fi
        if [ -d /repo/shows.json ]; then
          echo "Backing up unexpected legacy shows.json directory..."
          mv /repo/shows.json /repo/shows.json.dir-backup.$$(date +%Y%m%d%H%M%S)
        fi
        if [ -f /repo/shows.json ] && [ ! -e /storage/shows.json ]; then
          mv /repo/shows.json /storage/shows.json
        fi
        if [ -f /repo/shows.json.backup ] && [ ! -e /storage/shows.json.backup ]; then
          mv /repo/shows.json.backup /storage/shows.json.backup
        fi
        for legacy in episodes downloads thumbnails data cache auto_add_dir music_dir; do
          if [ -e "/repo/$$legacy" ] && [ ! -e "/storage/$$legacy" ]; then
            mv "/repo/$$legacy" "/storage/$$legacy"
          fi
        done
        mkdir -p /storage/episodes /storage/thumbnails /storage/downloads /storage/data /storage/cache /storage/auto_add_dir /storage/music_dir
        [ -f /storage/shows.json ] || echo '{}' > /storage/shows.json
        # Ensure writable by appuser (UID 999) inside the web container
        chmod 666 /storage/shows.json
        # Ensure data directories are writable
        for dir in /storage/episodes /storage/thumbnails /storage/downloads /storage/data /storage/cache /storage/auto_add_dir /storage/music_dir; do
          mkdir -p "$$dir"
          chmod 777 "$$dir"
        done

        # -- SSL certificate ---------------------------------------------------
        if [ -f /ssl/fullchain.pem ] && [ -f /ssl/privkey.pem ]; then
          echo "SSL certificates already exist — skipping."
          exit 0
        fi
        apk add --no-cache openssl >/dev/null 2>&1
        echo "Generating self-signed SSL certificate for localhost..."
        openssl req -x509 -nodes -days 3650 \
          -newkey rsa:2048 \
          -keyout /ssl/privkey.pem \
          -out /ssl/fullchain.pem \
          -subj "/CN=localhost" \
          -addext "subjectAltName=DNS:localhost,IP:127.0.0.1" 2>/dev/null
        chmod 644 /ssl/fullchain.pem
        chmod 600 /ssl/privkey.pem
        echo "SSL certificate created."
    volumes:
      - ./config/nginx/ssl:/ssl
      - .:/repo
      - ./storage:/storage
    networks: []

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      init:
        condition: service_completed_successfully
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
      - ./storage/thumbnails:/usr/share/nginx/html/thumbnails:ro
    environment:
      # Suppress "can not modify /etc/nginx/conf.d/default.conf" notice
      # This is expected because we mount the config as read-only (:ro)
      # which is the correct security practice
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
